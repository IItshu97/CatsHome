spring:
  application:
    name: catshome-smarthome

  datasource:
    url: jdbc:postgresql://localhost:5432/smarthomedb
    username: ${DB_USERNAME:smarthome}
    password: ${DB_PASSWORD:smarthome}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api/v1
